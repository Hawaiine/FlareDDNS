#!/bin/bash
# ============================================================
# FlareDDNS 配置文件
# 复制此文件为 config.conf 并填入你的配置
# ============================================================

# ---- Cloudflare API Token（推荐） ----
# 在 Cloudflare Dashboard → My Profile → API Tokens → Create Token
# 权限: Zone.Zone:Read, Zone.DNS:Edit
# 作用域: 指定域名或所有域名
CF_API_TOKEN="YOUR_CLOUDFLARE_API_TOKEN"

# ---- Zone ID ----
# Cloudflare 域名概览页面右下角可找到
CF_ZONE_ID="YOUR_ZONE_ID"

# ---- 需要更新的域名列表 ----
# 支持任意数量，使用数组格式，按优先级排序
# 第1快的IP → 列表第1个域名，第2快的IP → 列表第2个域名 ...
RECORD_NAMES=(
    "cdn1.yourdomain.com"
    "cdn2.yourdomain.com"
    "cdn3.yourdomain.com"
)

# ---- CloudflareST 自定义参数（可选） ----
# 留空则使用默认: -p 0 -o result.csv
# 常见参数:
#   -n 200     测速线程数 (默认200)
#   -t 4       测速延迟测试次数 (默认4)
#   -dn 10     延迟测速结果数量 (默认10)
#   -tl 300    平均延迟上限 (默认300ms)
#   -sl 50     下载速度下限 (默认50MB/s)
#   -p 0       显示结果数量 (0=全部)
#   -f ip.txt  自定义IP列表
# 详细: https://github.com/XIU2/CloudflareSpeedTest
CFST_ARGS="-p 0"

# ---- DNS 记录设置 ----
DNS_TTL=60          # TTL (秒), 60=自动, 120/300/600/900/1800/3600/7200/86400
DNS_PROXIED=false   # 是否开启 Cloudflare CDN 代理 (true/false)
