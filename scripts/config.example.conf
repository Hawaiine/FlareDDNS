#!/bin/bash
# ============================================================
# FlareDDNS 配置文件
# 复制此文件为 config.conf 并填入你的配置
# 注意：config.conf 含有 API Token，切勿提交到 Git！
# ============================================================

# ---- Cloudflare API Token（推荐） ----
# 创建地址: https://dash.cloudflare.com/profile/api-tokens
# 权限模板: Edit zone DNS → 勾选 Zone:Zone:Read + Zone:DNS:Edit
# 作用域: 选择要更新的域名
CF_API_TOKEN="YOUR_CLOUDFLARE_API_TOKEN"

# ---- Zone ID ----
# Cloudflare 域名概览页面右下角可找到
CF_ZONE_ID="YOUR_ZONE_ID"

# ---- 需要更新的域名列表 ----
# 支持任意数量，使用数组格式，按优先级排序
# 第1快的IP → 列表第1个域名，第2快的IP → 列表第2个域名 ...
# 未在 Cloudflare DNS 中存在的域名会被自动跳过，后续域名顺位接力
RECORD_NAMES=(
    "cdn1.yourdomain.com"
    "cdn2.yourdomain.com"
    "cdn3.yourdomain.com"
)

# ---- CloudflareST 自定义参数（可选） ----
# ⚠️ 注意: -o（输出路径）由脚本自动追加，请勿在这里写 -o！
# 常见参数:
#   -n 200     测速线程数 (默认200)
#   -t 4       延迟测试次数 (默认4)
#   -dn 10     延迟测速结果数量 (默认10)
#   -tl 300    平均延迟上限 (单位ms)
#   -sl 50     下载速度下限 (单位MB/s)
#   -p 10      显示结果数量 (0=全部)
#   -f ip.txt  自定义IP列表文件
# 完整文档: https://github.com/XIU2/CloudflareSpeedTest
CFST_ARGS="-p 0"

# ---- DNS 记录设置 ----
DNS_TTL=60          # TTL (秒), 60=自动
                    # 注意: proxied=true 时 TTL 会被 Cloudflare 强制设为"自动"(60)
DNS_PROXIED=false   # 是否开启 Cloudflare CDN 代理 (orange cloud)
                    # 建议 false：开启代理后客户端走 Anycast 网络而非测速选出的源站 IP，
                    # "优选 IP" 的实际效果会大打折扣